{{ define "detail_post.html" }}

{{ template "layout" . }}

<div class="detail-wrap">
    <a class="btn-back" href="/">← back</a>

    <div class="detail-meta">
        {{ if .post.Category.Name }}
        <span class="detail-category">{{ .post.Category.Name }}</span>
        {{ end }}
        <div class="detail-date">{{ .post.CreatedAt.Format "02 Jan 2006 15:04" }}</div>
    </div>

    <div class="detail-title">{{ .post.Title }}</div>
    <div class="detail-divider"></div>
    <div class="detail-content">{{ .post.Entry }}</div>

    {{if eq $.user.Username .post.Author.Username }}
    <div class="detail-actions">
        <a class="btn-edit" href="/posts/update/{{ .post.ID }}">edit</a>
        <form method="post" action="/posts/delete/{{ .post.ID }}" style="margin:0;">
            <button class="btn-delete" type="submit">delete</button>
        </form>
    </div>
    {{ end }}
</div>

{{ end }}
